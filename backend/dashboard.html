<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarmWise AI - Contextual Assistant</title>
    <style>
        /* Add to existing styles */
        .context-badge {
            background: #e6f7e6;
            color: #2e7d32;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            margin-left: 8px;
        }
        .suggestion-buttons {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .suggestion-btn {
            background: #f0f0f0;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .suggestion-btn:hover {
            background: #48bb78;
            color: white;
        }
        .feedback-buttons {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        .feedback-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.8rem;
            opacity: 0.5;
            transition: opacity 0.2s;
        }
        .feedback-btn:hover { opacity: 1; }
        .thinking { display: inline-block; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>
    <!-- Same HTML structure, but update JavaScript -->
    <script>
        // Enhanced sendMessage with context tracking
        let lastMessageId = null;
        let messageHistory = [];

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const msg = input.value.trim();
            if (!msg) return;
            
            const chatDiv = document.getElementById('chatMessages');
            const messageId = Date.now();
            
            // Add user message
            chatDiv.innerHTML += `
                <div class="message user" data-id="${messageId}">
                    <div class="message-bubble">${escapeHtml(msg)}</div>
                </div>`;
            input.value = '';
            chatDiv.scrollTop = chatDiv.scrollHeight;
            
            // Show thinking indicator
            const thinkingId = Date.now() + 1;
            chatDiv.innerHTML += `
                <div class="message bot" data-id="${thinkingId}">
                    <div class="message-bubble thinking">🤖 Thinking <span class="thinking">...</span></div>
                </div>`;
            chatDiv.scrollTop = chatDiv.scrollHeight;
            
            try {
                const res = await fetch(`${API_URL}/api/chatbot/ask`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: msg })
                });
                const data = await res.json();
                
                // Remove thinking indicator
                document.querySelector(`[data-id="${thinkingId}"]`).remove();
                
                // Add AI response with context
                chatDiv.innerHTML += `
                    <div class="message bot" data-id="${data.context?.item || 'response'}">
                        <div class="message-bubble">
                            ${escapeHtml(data.answer).replace(/\n/g, '<br>')}
                            ${data.context?.item ? `<div class="context-badge">📚 Context: ${data.context.item}</div>` : ''}
                            ${data.suggestions ? `
                                <div class="suggestion-buttons">
                                    ${data.suggestions.map(s => `<button class="suggestion-btn" onclick="quickAsk('${s}')">${s}</button>`).join('')}
                                </div>
                            ` : ''}
                            <div class="feedback-buttons">
                                <button class="feedback-btn" onclick="sendFeedback('${data.context?.item || 'general'}', true)">👍 Helpful</button>
                                <button class="feedback-btn" onclick="sendFeedback('${data.context?.item || 'general'}', false)">👎 Not Helpful</button>
                            </div>
                        </div>
                    </div>`;
                chatDiv.scrollTop = chatDiv.scrollHeight;
                
                // Store in history
                messageHistory.push({ question: msg, answer: data.answer, context: data.context });
                lastMessageId = messageId;
                
            } catch (error) {
                document.querySelector(`[data-id="${thinkingId}"]`).remove();
                chatDiv.innerHTML += `<div class="message bot"><div class="message-bubble">❌ Sorry, I'm having trouble connecting. Please try again.</div></div>`;
            }
        }
        
        function quickAsk(suggestion) {
            document.getElementById('chatInput').value = suggestion;
            sendMessage();
        }
        
        async function sendFeedback(topic, helpful) {
            try {
                await fetch(`${API_URL}/api/chatbot/feedback`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ questionId: topic, helpful, comments: '' })
                });
                showToast('Thank you for your feedback!', 'success');
            } catch (error) {
                console.error('Feedback error:', error);
            }
        }
        
        // Load contextual advice
        async function loadContextualAdvice() {
            try {
                const res = await fetch(`${API_URL}/api/advice/contextual`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.advice && data.advice.length > 0) {
                    const adviceDiv = document.getElementById('adviceContent');
                    adviceDiv.innerHTML = data.advice.map(a => `
                        <div class="reminder-item" style="border-left-color: ${a.priority === 'high' ? '#f56565' : '#48bb78'}">
                            <div><strong>${a.title}</strong><br>${a.content}</div>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('Contextual advice error:', error);
            }
        }
        
        // Override loadAllData to include contextual advice
        const originalLoadAllData = loadAllData;
        loadAllData = async function() {
            await originalLoadAllData();
            await loadContextualAdvice();
        };
    </script>
</body>
</html>
